## This file contains files and directories that should
## be preserved during an upgrade.

# ACME/Let's Encrypt state: account key, issued certs (/etc/ssl/acme
# holds symlinks into /etc/acme)
/etc/acme/
/etc/ssl/acme/

# Scheduled tasks (acme-common re-adds its nightly renew line on boot if
# missing, but this also preserves any manually added jobs)
/etc/crontabs/root
